pre-commit:
  commands:
    format:
      glob: "*.dart"
      run: dart format {staged_files} && git add {staged_files}
    analyze:
      glob: "*.dart"
      run: dart analyze --fatal-warnings {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: sh scripts/check-commit-msg.sh {1}
