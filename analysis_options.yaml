include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # Tratar imports não utilizados como erro
    unused_import: error
    # Tratar variáveis não utilizadas como warning
    unused_local_variable: warning
  exclude:
    # Arquivos gerados pelo build_runner
    - "**/*.g.dart"
    - "**/*.config.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Desabilitar regras que conflitam com o padrão do projeto
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    one_member_abstracts: false
    sort_pub_dependencies: false
